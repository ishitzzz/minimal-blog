<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Tactile Blog</title>
    <!-- Fonts: Typewriter theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <!-- Dependencies: GSAP for animations, Lucide for icons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <!-- Lenis for smooth scrolling -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <!-- SVG REFRACTION FILTER — the "Ryan Yu Optics Engine"
         feTurbulence creates organic noise, feDisplacementMap warps the image through it -->
    <svg style="position: absolute; left: -9999px; pointer-events: none;" xmlns="http://www.w3.org/2000/svg">
        <filter id="glass-blur" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox">
            <feTurbulence id="svg-turb" type="fractalNoise" baseFrequency="0.003 0.007" numOctaves="1"
                result="turbulence" />
            <feDisplacementMap id="svg-disp" in="SourceGraphic" in2="turbulence" scale="150" xChannelSelector="R"
                yChannelSelector="G" />
        </filter>
    </svg>

    <!-- Background Texture -->
    <div class="bg-texture"></div>

    <!-- Header Section -->
    <header class="site-header">
        <h1 class="logo">Tactile.</h1>
        <nav class="main-nav">
            <a href="#">Articles</a>
            <a href="#">Gallery</a>
            <a href="#">Studio</a>
        </nav>
    </header>

    <!-- The Pinned Section containing the cards — populated dynamically by app.js -->
    <main class="sticky-card-section">
    </main>

    <!-- Footer Section -->
    <footer class="site-footer">
        <p>&copy; 2026 Tactile Blog. All rights reserved.</p>
    </footer>

    <script>window.API_BASE = 'http://localhost:4000';</script>
    <script src="tracker.js"></script>
    <script src="app.js"></script>
</body>

</html>
